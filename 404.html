<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Maximilian Richter</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080a;color:#e8e8ed;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:2rem}
.code{font-family:'JetBrains Mono',monospace;font-size:clamp(5rem,12vw,10rem);font-weight:800;letter-spacing:-.04em;background:linear-gradient(90deg,#00d4ff,#ff3c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:1rem}
.msg{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:#4a4a58;margin-bottom:2.5rem;line-height:1.8}
.msg span{color:#8a8a98}
.back{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#00d4ff;text-decoration:none;padding:.7rem 1.5rem;border:1px solid rgba(0,212,255,.2);transition:all .3s}
.back:hover{background:rgba(0,212,255,.06);border-color:#00d4ff}
</style>
</head>
<body>
<div class="code">404</div>
<div class="msg">
$ find / -name "this_page"<br>
<span>Error: no results found.</span><br>
$ suggest --redirect home
</div>
<a href="/" class="back">← Back to Portfolio</a>
</body>
</html>
